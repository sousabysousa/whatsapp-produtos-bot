<h2>Cadastrar Produto</h2>

<form action="/produto" method="POST" enctype="multipart/form-data">

<input name="nome" placeholder="Produto">

<input name="preco" placeholder="Preço">

<textarea name="descricao"></textarea>

<input name="horario" placeholder="08:00">

<input name="grupo" placeholder="ID do grupo">

<input type="file" name="imagem">

<button type="submit">
Salvar
</button>

</form>
